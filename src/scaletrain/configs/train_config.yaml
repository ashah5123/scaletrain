tracking:
  enabled: true

data:
  data_dir: "./data"
  batch_size: 128
  num_workers: 0
  pin_memory: true

training:
  epochs: 3
  lr: 0.001
  weight_decay: 0.0
  device: "auto"        # auto | cpu | cuda | mps
  log_every_n_steps: 50

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment_name: "scaletrain"
  run_name: "mnist-cnn"
