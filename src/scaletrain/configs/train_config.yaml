tracking:
  enabled: true

data:
  data_dir: "./data"
  batch_size: 128
  num_workers: 2
  pin_memory: true

training:
  epochs: 3
  lr: 0.001
  weight_decay: 0.0
  device: "auto"        # auto|cpu|cuda|mps
  log_every_n_steps: 50

mlflow:
  tracking_uri: null    # e.g. "file:./mlruns" or "http://127.0.0.1:5000"
  experiment_name: "scaletrain"
  run_name: "mnist-cnn"

