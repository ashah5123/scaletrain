name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POETRY_NO_INTERACTION: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install "poetry>=2.0.0,<3.0.0"

      - name: Install project
        run: poetry install

      - name: Verify torch import
        run: poetry run python -c "import torch; print(torch.__version__)"

      - name: Verify CLI entry point
        run: poetry run scaletrain --help

      - name: Smoke test — 1 epoch CPU training
        run: poetry run scaletrain --config src/scaletrain/configs/ci_config.yaml
